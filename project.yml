name: MLXModelManager
options:
  bundleIdPrefix: com.mlx
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  MLXModelManager:
    type: application
    platform: macOS
    sources:
      - path: MLXModelManager
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mlx.modelmanager
        PRODUCT_NAME: MLXModelManager
        INFOPLIST_FILE: MLXModelManager/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: "YES"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: false
        SWIFT_VERSION: "5.9"
        ENABLE_PREVIEWS: "YES"

  MLXModelManagerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: MLXModelManagerTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: MLXModelManager
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mlx.modelmanager.tests
        PRODUCT_NAME: MLXModelManagerTests
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: true
        SWIFT_VERSION: "5.9"
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MLXModelManager.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/MLXModelManager"
