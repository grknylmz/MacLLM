name: MacLLM
options:
  bundleIdPrefix: com.macllm
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  MacLLM:
    type: application
    platform: macOS
    sources:
      - path: MacLLM
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macllm.app
        PRODUCT_NAME: MacLLM
        INFOPLIST_FILE: MacLLM/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: "YES"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: false
        SWIFT_VERSION: "5.9"
        ENABLE_PREVIEWS: "YES"

  MacLLMTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: MacLLMTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: MacLLM
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macllm.app.tests
        PRODUCT_NAME: MacLLMTests
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: true
        SWIFT_VERSION: "5.9"
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MacLLM.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/MacLLM"
